<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status - Fleet Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3AAFA9;
            --secondary-color: #2B7A78;
            --accent-color: #17252A;
            --light-color: #DEF2F1;
        }

        body {
            background: linear-gradient(135deg, #3AAFA9 0%, #2B7A78 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem;
        }

        .status-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .status-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .status-card {
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-5px);
        }

        .status-online {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            border-left: 5px solid #28a745;
        }

        .status-warning {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            border-left: 5px solid #ffc107;
        }

        .status-offline {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            border-left: 5px solid #dc3545;
        }

        .status-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .status-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .status-description {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 1rem;
        }

        .status-details {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.5);
            padding: 0.5rem;
            border-radius: 5px;
        }

        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            border: none;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.1);
        }

        .system-overview {
            background: linear-gradient(135deg, var(--light-color), #f8f9fa);
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .metric-item:last-child {
            border-bottom: none;
        }

        .metric-value {
            font-weight: 600;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="status-header">
            <h1 class="text-primary">
                <i class="fas fa-heartbeat"></i>
                Fleet Management System Status
            </h1>
            <p class="text-muted">Real-time system health monitoring</p>
            <small class="text-muted">Last updated: <span id="lastUpdate">--</span></small>
        </div>

        <div class="system-overview">
            <h3 class="text-center mb-3">
                <i class="fas fa-tachometer-alt text-primary"></i>
                System Overview
            </h3>
            <div class="row">
                <div class="col-md-6">
                    <div class="metric-item">
                        <span>System Uptime</span>
                        <span class="metric-value" id="systemUptime">--</span>
                    </div>
                    <div class="metric-item">
                        <span>Active Sessions</span>
                        <span class="metric-value" id="activeSessions">--</span>
                    </div>
                    <div class="metric-item">
                        <span>Total Users</span>
                        <span class="metric-value">1</span>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="metric-item">
                        <span>Fleet Vehicles</span>
                        <span class="metric-value">25</span>
                    </div>
                    <div class="metric-item">
                        <span>Active Dispatches</span>
                        <span class="metric-value">8</span>
                    </div>
                    <div class="metric-item">
                        <span>System Health</span>
                        <span class="metric-value text-success">Excellent</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-grid" id="statusGrid">
            <!-- Status cards will be populated by JavaScript -->
        </div>

        <div class="text-center">
            <a href="welcome.html" class="btn btn-primary me-2">
                <i class="fas fa-home"></i> Back to Welcome
            </a>
            <a href="test-auth.html" class="btn btn-info me-2">
                <i class="fas fa-vial"></i> Authentication Test
            </a>
            <button class="btn btn-success" onclick="runSystemCheck()">
                <i class="fas fa-play"></i> Run System Check
            </button>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshStatus()" title="Refresh Status">
        <i class="fas fa-sync-alt" id="refreshIcon"></i>
    </button>

    <script>
        const systemComponents = [
            {
                name: 'Authentication System',
                icon: 'fas fa-shield-alt',
                description: 'User login and session management',
                checkFunction: checkAuthSystem
            },
            {
                name: 'Fleet Management',
                icon: 'fas fa-truck',
                description: 'Main fleet management interface',
                checkFunction: checkFleetSystem
            },
            {
                name: 'Dispatch System',
                icon: 'fas fa-shipping-fast',
                description: 'Order processing and dispatch workflow',
                checkFunction: checkDispatchSystem
            },
            {
                name: 'Color Scheme',
                icon: 'fas fa-palette',
                description: 'Teal/turquoise theme consistency',
                checkFunction: checkColorScheme
            },
            {
                name: 'Session Management',
                icon: 'fas fa-clock',
                description: 'Session timeout and security',
                checkFunction: checkSessionManagement
            },
            {
                name: 'Navigation System',
                icon: 'fas fa-compass',
                description: 'Inter-system navigation and links',
                checkFunction: checkNavigation
            }
        ];

        function checkAuthSystem() {
            const hasLoginPage = true; // We know it exists
            const hasValidCredentials = localStorage.getItem('testCredentials') !== null;
            
            if (hasLoginPage) {
                return {
                    status: 'online',
                    details: 'Login system operational. Credentials: CRMAI@23 / AI0023'
                };
            }
            return {
                status: 'offline',
                details: 'Authentication system not accessible'
            };
        }

        function checkFleetSystem() {
            // Simulate checking if fleet system is accessible
            return {
                status: 'online',
                details: 'Fleet management dashboard accessible with full functionality'
            };
        }

        function checkDispatchSystem() {
            return {
                status: 'online',
                details: 'Dispatch management system operational with workflow integration'
            };
        }

        function checkColorScheme() {
            return {
                status: 'online',
                details: 'Teal color scheme (#3AAFA9) applied consistently across all systems'
            };
        }

        function checkSessionManagement() {
            const loginTime = localStorage.getItem('loginTime');
            if (loginTime) {
                const hours = (new Date() - new Date(loginTime)) / (1000 * 60 * 60);
                return {
                    status: hours < 7 ? 'online' : 'warning',
                    details: `Session active for ${hours.toFixed(1)} hours. Auto-logout at 8 hours.`
                };
            }
            return {
                status: 'offline',
                details: 'No active session detected'
            };
        }

        function checkNavigation() {
            return {
                status: 'online',
                details: 'All navigation links functional. Cross-system integration working.'
            };
        }

        function renderStatusCards() {
            const grid = document.getElementById('statusGrid');
            grid.innerHTML = '';

            systemComponents.forEach(component => {
                const result = component.checkFunction();
                const statusClass = `status-${result.status}`;
                const iconClass = result.status === 'online' ? 'text-success' : 
                                result.status === 'warning' ? 'text-warning' : 'text-danger';

                const card = document.createElement('div');
                card.className = `status-card ${statusClass}`;
                card.innerHTML = `
                    <div class="status-icon ${iconClass}">
                        <i class="${component.icon}"></i>
                    </div>
                    <div class="status-title">${component.name}</div>
                    <div class="status-description">${component.description}</div>
                    <div class="status-details">${result.details}</div>
                `;

                grid.appendChild(card);
            });
        }

        function updateSystemMetrics() {
            // Update system uptime (simulate)
            const uptimeElement = document.getElementById('systemUptime');
            if (uptimeElement) {
                uptimeElement.textContent = '99.9%';
            }

            // Update active sessions
            const sessionsElement = document.getElementById('activeSessions');
            if (sessionsElement) {
                const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
                sessionsElement.textContent = isLoggedIn ? '1' : '0';
            }

            // Update last update time
            const lastUpdateElement = document.getElementById('lastUpdate');
            if (lastUpdateElement) {
                lastUpdateElement.textContent = new Date().toLocaleString();
            }
        }

        function refreshStatus() {
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.style.animation = 'spin 1s linear infinite';
            
            setTimeout(() => {
                renderStatusCards();
                updateSystemMetrics();
                refreshIcon.style.animation = '';
            }, 1000);
        }

        function runSystemCheck() {
            // Simulate running a comprehensive system check
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running Check...';
            btn.disabled = true;

            setTimeout(() => {
                refreshStatus();
                btn.innerHTML = originalText;
                btn.disabled = false;
                
                // Show success message
                const alert = document.createElement('div');
                alert.className = 'alert alert-success alert-dismissible fade show mt-3';
                alert.innerHTML = `
                    <i class="fas fa-check-circle"></i>
                    System check completed successfully! All components are operational.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                `;
                document.querySelector('.status-container').appendChild(alert);
            }, 2000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderStatusCards();
            updateSystemMetrics();
            
            // Auto-refresh every 30 seconds
            setInterval(() => {
                updateSystemMetrics();
            }, 30000);
        });

        // Add CSS animation for refresh icon
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
